packages:
  - 'apps/*'
  - 'packages/*'

# C-5: dependency overrides live in `package.json#pnpm.overrides`. Workspace-level
# `overrides:` here is a silent no-op on pnpm 8.x (a pnpm 9/10 feature), so the
# `minimatch@10.x` + `serialize-javascript` pins were unenforced and `rollup` was
# already redundantly covered by the package.json `rollup@>=4.0.0 <4.59.0` rule.
