name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # Phase 4.2 (audit/2026-05-08): bumped from 20 → 24 ahead of the
          # 2026-06-02 deprecation deadline for the older runner-bundled
          # Node. Vercel's runtime has already moved to Node 24 LTS.
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Formatting gate (2026-06-07): `prettier --check .` covers all tracked
      # source + docs (markdown included; .prettierignore excludes build output).
      # Placed first as the cheapest fail-fast check. Fix locally with `pnpm format`.
      - run: pnpm format:check
      - run: pnpm type-check
      - run: pnpm lint
      - run: pnpm test
      # C-3: static gates that previously ran only locally (via validate:all).
      # The Phase-7 jargon ban + the "no direct market-data constant imports"
      # SDK invariant — both server-free. (Not `validate:market-data`, whose
      # fixtures.test.ts is already covered by `pnpm test` above.)
      - run: node scripts/check-market-data-jargon.mjs
      - run: pnpm validate:sdk-invariant
      - run: pnpm validate:translations
      - run: pnpm validate:design-tokens
      - run: pnpm build
      # Phase 5.2 (audit/2026-05-09): Turbopack-aware bundle-budget gate.
      # Replaces the original webpack-plugin enforcement (was inert under
      # Turbopack — see F1 audit). Walks `.next/static/chunks` for size /
      # count regressions. Fails CI if peak asset, total, or count exceed
      # baseline + headroom recorded in scripts/check-bundle-budget.mjs.
      - run: pnpm check:budget
      # Phase 3B (audit/2026-05-18): build-storybook gate. Storybook stories
      # are EXCLUDED from `tsc --noEmit` per `apps/web/tsconfig.json:40-41`
      # (L13 audit lock), so story-file TypeScript errors are only caught by
      # `build-storybook`. Run after build:budget so we don't double-pay for
      # an early failure when the production build itself broke.
      - run: pnpm --filter web build-storybook
