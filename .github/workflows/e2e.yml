name: E2E (Playwright)

# Phase 4.3.c (audit/2026-05-08): happy-path coverage for the waitlist
# signup flow. The DB layer is stubbed inside the test (page.route() on
# /api/waitlist/signup), so this workflow needs no secrets and no
# external infra. It runs the production build on localhost and
# exercises a real browser against it.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Budget: build (~5m) + tests (~2m). No browser download — CI uses the
    # runner's preinstalled Google Chrome (see playwright.config.ts), which
    # removed the slow/flaky 170 MB Chromium download that previously hung the job.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # No `playwright install` step: CI runs against the runner's preinstalled
      # Google Chrome via `channel: 'chrome'` in playwright.config.ts (the same
      # binary the pa11y job uses). This eliminates the 170 MB cdn.playwright.dev
      # Chromium download that was hanging / timing out the job.

      - name: Build production bundle
        # `pnpm build` from root → `turbo run build`. The web app imports
        # from workspace packages (@diboas/i18n, @diboas/ui, @diboas/email)
        # which must be built first; `pnpm --filter web build` skips them
        # and fails with Module not found. (First-CI-run bug fix, 2026-05-09.)
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'

      - name: Run Playwright tests
        # `playwright.config.ts` starts the prod server itself via the
        # `webServer` block — no need to background it here.
        #
        # `next start` (NODE_ENV=production) runs the env validator in
        # `apps/web/src/config/env.ts`, which throws on missing secrets.
        # The Playwright test stubs the API layer via `page.route()`, so
        # these values never reach a real service — they exist purely to
        # satisfy the startup gate.
        run: pnpm exec playwright test
        env:
          CI: 'true'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa='
          DATABASE_URL: 'postgresql://stub:stub@localhost:5432/stub'
          INTERNAL_API_KEY: 'ci-stub-key'
          RESEND_API_KEY: 're_ci_stub'
          HMAC_KEY: 'ci-stub-hmac-key-32-chars-padding-here'
          # C-2: now a required prod var (valid-format stub so the startup gate
          # passes and Sentry.init doesn't reject the DSN).
          NEXT_PUBLIC_SENTRY_DSN: 'https://ci-stub@o0.ingest.sentry.io/0'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
