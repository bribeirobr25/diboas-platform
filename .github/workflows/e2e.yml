name: E2E (Playwright)

# Phase 4.3.c (audit/2026-05-08): happy-path coverage for the waitlist
# signup flow. The DB layer is stubbed inside the test (page.route() on
# /api/waitlist/signup), so this workflow needs no secrets and no
# external infra. It runs the production build on localhost and
# exercises a real browser against it.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Headroom over the legitimate budget (install ≤2m on cache miss + build
    # ~4m + tests ~2m). Per-step timeouts below catch a genuine hang fast, so
    # this is margin, not a place to hide one.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Resolve the Playwright version for a precise cache key, so the ~170 MB
      # Chromium download only runs on a cache miss. (Root cause of the prior
      # ~20-min job cancellation: `playwright install --with-deps` hung — apt
      # lock contention on ubuntu-noble and/or a stalling cdn.playwright.dev
      # download. Splitting + caching + retrying + time-boxing removes that.)
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | sed 's/Version //')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      # System libs for Chromium (apt). Split from the binary download so an apt
      # lock-wait can't masquerade as a download hang. Retried + time-boxed: a
      # stall fails fast and re-attempts instead of consuming the whole job.
      - name: Install Playwright system deps
        timeout-minutes: 6
        run: |
          for i in 1 2 3; do
            pnpm exec playwright install-deps chromium && exit 0
            echo "install-deps attempt $i failed; retrying in 5s…"; sleep 5
          done
          echo "install-deps failed after 3 attempts"; exit 1

      # Browser binary download (cdn.playwright.dev). Skipped on cache hit;
      # retried + time-boxed against CDN stalls on a cache miss.
      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 8
        run: |
          for i in 1 2 3; do
            pnpm exec playwright install chromium && exit 0
            echo "install attempt $i failed; retrying in 5s…"; sleep 5
          done
          echo "playwright install failed after 3 attempts"; exit 1

      - name: Build production bundle
        # `pnpm build` from root → `turbo run build`. The web app imports
        # from workspace packages (@diboas/i18n, @diboas/ui, @diboas/email)
        # which must be built first; `pnpm --filter web build` skips them
        # and fails with Module not found. (First-CI-run bug fix, 2026-05-09.)
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'

      - name: Run Playwright tests
        # `playwright.config.ts` starts the prod server itself via the
        # `webServer` block — no need to background it here.
        #
        # `next start` (NODE_ENV=production) runs the env validator in
        # `apps/web/src/config/env.ts`, which throws on missing secrets.
        # The Playwright test stubs the API layer via `page.route()`, so
        # these values never reach a real service — they exist purely to
        # satisfy the startup gate.
        run: pnpm exec playwright test
        env:
          CI: 'true'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa='
          DATABASE_URL: 'postgresql://stub:stub@localhost:5432/stub'
          INTERNAL_API_KEY: 'ci-stub-key'
          RESEND_API_KEY: 're_ci_stub'
          HMAC_KEY: 'ci-stub-hmac-key-32-chars-padding-here'
          # C-2: now a required prod var (valid-format stub so the startup gate
          # passes and Sentry.init doesn't reject the DSN).
          NEXT_PUBLIC_SENTRY_DSN: 'https://ci-stub@o0.ingest.sentry.io/0'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
