name: Security Audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # Weekly scans

jobs:
  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can diff PR commits against base.
          # Configured via .gitleaks.toml at repo root.
          fetch-depth: 0
      - name: Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required so the action can post a summary comment on PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Hard-fail the job if any unallowlisted secret is found.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # Phase 4.2 (audit/2026-05-08): bumped from 20 → 24 — see ci.yml.
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Security Audit
        id: audit
        run: |
          # Fail only on CRITICAL vulnerabilities.
          #
          # Known MODERATE with no runtime exposure (build-time transitive only,
          # tracked in docs/audit/SECURITY_FINDINGS_2026-05.md § F21):
          #   - brace-expansion 2.0.0–2.0.2 (GHSA-f886-m6hf-6m8v) — via @sentry/bundler-plugin-core > glob > minimatch
          #   - brace-expansion 5.0.0–5.0.5 (GHSA-jxxr-4gwj-5jf2) — via @sentry/node > @fastify/otel > minimatch
          #   - postcss (GHSA-qx2v-qp2m-jg93) — via next@16.2.6 > postcss@8.4.31; resolves on next minor Next.js bump
          #
          # Previously-known HIGH defanged via pnpm.overrides at root (F21 closeout, 2026-06-01):
          #   - fast-uri <=3.1.1 (GHSA-q3j6-qgpj-74h6 + GHSA-v39h-62p7-jpjc) — overridden to >=3.1.2
          #
          # Baseline post-override: 4 moderate / 0 high. Update this list when
          # the override resolves or a new transitive HIGH appears.
          pnpm audit --prod --audit-level=critical || echo "failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Notify Slack on Failure
        if: steps.audit.outputs.failed == 'true'
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_ALERT }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Security vulnerabilities detected in diBoaS Platform",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security Audit Failed*\n*Event:* ${{ github.event_name }}\n*Branch:* ${{ github.ref_name }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }

      - name: Fail if vulnerabilities found
        if: steps.audit.outputs.failed == 'true'
        run: exit 1
