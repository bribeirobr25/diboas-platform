name: Security Audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # Weekly scans

jobs:
  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can diff PR commits against base.
          # Configured via .gitleaks.toml at repo root.
          fetch-depth: 0
      - name: Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required so the action can post a summary comment on PRs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Hard-fail the job if any unallowlisted secret is found.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # Phase 4.2 (audit/2026-05-08): bumped from 20 → 24 — see ci.yml.
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Security Audit
        id: audit
        run: |
          # Fail only on CRITICAL vulnerabilities.
          # Known HIGH with no upstream fix (monitored weekly):
          #   - next@16.1.7 GHSA-848j (DoS with Server Components)
          #   - brace-expansion (transitive via glob/minimatch)
          pnpm audit --prod --audit-level=critical || echo "failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Notify Slack on Failure
        if: steps.audit.outputs.failed == 'true'
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_ALERT }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Security vulnerabilities detected in diBoaS Platform",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security Audit Failed*\n*Event:* ${{ github.event_name }}\n*Branch:* ${{ github.ref_name }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }

      - name: Fail if vulnerabilities found
        if: steps.audit.outputs.failed == 'true'
        run: exit 1
