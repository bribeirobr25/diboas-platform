name: Lighthouse CI

# Phase 4.3.a (audit/2026-05-08): warn-only Core Web Vitals + Lighthouse
# category checks on every PR. Thresholds calibrated for mobile per
# Google's "Good" Core Web Vitals boundaries:
#   LCP <2.5s · CLS <0.1 · TBT <300ms · all categories ≥0.9.
#
# Strictness plan:
#   - Today (warn-only): visible in PR checks, never blocks merge.
#   - +2 weeks: flip "warn" → "error" in lighthouserc.json once we've
#     calibrated the thresholds against actual CI-runner performance.
#
# Run locally: `pnpm --filter web lighthouse`

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build production bundle
        # `pnpm build` from root → `turbo run build`. The web app imports
        # from workspace packages (@diboas/i18n, @diboas/ui, @diboas/email)
        # which must be built first; `pnpm --filter web build` skips them
        # and fails with Module not found. (First-CI-run bug fix, 2026-05-09.)
        run: pnpm build
        env:
          # Stub out env vars that the build path validates but that we
          # don't need to talk to real services for performance auditing.
          # See `apps/web/src/config/env.ts` for the validation rules.
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'

      - name: Start production server (background) and wait for ready
        # Same pattern as the accessibility workflow — explicit readiness
        # check via curl is more reliable than lhci's startServerCommand
        # + startServerReadyPattern because Next.js's "Ready in N ms"
        # output races slightly ahead of full route availability.
        # Full stub env block needed because next start runs env.ts
        # production-secrets validator. (First-CI-run bug fix, 2026-05-09.)
        env:
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa='
          DATABASE_URL: 'postgresql://stub:stub@localhost:5432/stub'
          INTERNAL_API_KEY: 'ci-stub-key'
          RESEND_API_KEY: 're_ci_stub'
          HMAC_KEY: 'ci-stub-hmac-key-32-chars-padding-here'
        run: |
          pnpm --filter web start &
          for i in {1..60}; do
            if curl -sf http://localhost:3000/en > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 60s"
          exit 1

      - name: Run Lighthouse CI (warn-only)
        run: pnpm --filter web lighthouse
        # `lhci autorun` exits 0 when only warnings are emitted (per
        # lighthouserc.json's `["warn", ...]` assertions). It exits
        # non-zero only on `error`-level assertion failures, which we
        # currently have none of.
        continue-on-error: true
