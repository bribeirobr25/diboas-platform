name: Accessibility (pa11y)

# WCAG 2.1 AA scan. The URL set lives in `apps/web/.pa11yci.json`
# (currently 21 URLs: home, about, B2B landing, lesson, the full Money
# Tools suite, the /market dashboards across locales, protocols, and
# strategies) and is driven by `scripts/pa11y.mjs`. Adding a route only
# requires editing the JSON.
#
# Run locally: `pnpm --filter web pa11y` (same script, same URLs).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pa11y:
    runs-on: ubuntu-latest
    # Headroom for the per-URL --timeout (120s in .pa11yci.json): build (~5m) +
    # server start + worst-case pa11y. Must exceed the per-URL budget × the
    # heavy pages so a genuine pa11y failure is reported cleanly rather than
    # turning into an ambiguous job cancellation.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build production bundle
        # `pnpm build` from root → `turbo run build`. The web app imports
        # from workspace packages (@diboas/i18n, @diboas/ui, @diboas/email)
        # which must be built first; `pnpm --filter web build` skips them
        # and fails with Module not found. (First-CI-run bug fix, 2026-05-09.)
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'

      - name: Start production server (background)
        # `pnpm --filter web start` runs `next start` on port 3000.
        # We background it and wait for the port to come up before
        # running pa11y against it. The env block stubs out the
        # production-secrets validator in apps/web/src/config/env.ts,
        # which throws on missing values — same pattern E2E uses.
        # (First-CI-run bug fix, 2026-05-09.)
        env:
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa='
          DATABASE_URL: 'postgresql://stub:stub@localhost:5432/stub'
          INTERNAL_API_KEY: 'ci-stub-key'
          RESEND_API_KEY: 're_ci_stub'
          HMAC_KEY: 'ci-stub-hmac-key-32-chars-padding-here'
          # C-2: now a required prod var (valid-format stub so the startup gate passes).
          NEXT_PUBLIC_SENTRY_DSN: 'https://ci-stub@o0.ingest.sentry.io/0'
        run: |
          pnpm --filter web start &
          # Wait for the server to be ready (max 60s).
          for i in {1..60}; do
            if curl -sf http://localhost:3000/en > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 60s"
          exit 1

      - name: Run pa11y on all configured pages
        # pa11y bundles puppeteer-core@24.37.5 which strictly looks for
        # Chrome at ~/.cache/puppeteer (not bundled, not auto-fetched).
        # GH Actions ubuntu-latest has Chrome pre-installed at
        # /usr/bin/google-chrome; pointing puppeteer-core at it via the
        # standard env var avoids needing to download Chrome separately.
        # (First-CI-run bug fix, 2026-05-09.)
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: pnpm --filter web pa11y
