name: Accessibility (pa11y)

# Phase 4.3.b (audit/2026-05-08): WCAG 2.1 AA scan against the three
# pages with the highest exposure: home, B2B landing, and the lesson
# page (the only page with a stand-alone interactive component beyond
# the hero/waitlist pattern).
#
# Run locally: `pnpm --filter web pa11y` (the script in
# apps/web/package.json points at the same three URLs).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pa11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build production bundle
        # `pnpm build` from root → `turbo run build`. The web app imports
        # from workspace packages (@diboas/i18n, @diboas/ui, @diboas/email)
        # which must be built first; `pnpm --filter web build` skips them
        # and fails with Module not found. (First-CI-run bug fix, 2026-05-09.)
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'

      - name: Start production server (background)
        # `pnpm --filter web start` runs `next start` on port 3000.
        # We background it and wait for the port to come up before
        # running pa11y against it. The env block stubs out the
        # production-secrets validator in apps/web/src/config/env.ts,
        # which throws on missing values — same pattern E2E uses.
        # (First-CI-run bug fix, 2026-05-09.)
        env:
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa='
          DATABASE_URL: 'postgresql://stub:stub@localhost:5432/stub'
          INTERNAL_API_KEY: 'ci-stub-key'
          RESEND_API_KEY: 're_ci_stub'
          HMAC_KEY: 'ci-stub-hmac-key-32-chars-padding-here'
        run: |
          pnpm --filter web start &
          # Wait for the server to be ready (max 60s).
          for i in {1..60}; do
            if curl -sf http://localhost:3000/en > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 60s"
          exit 1

      - name: Run pa11y on critical 3 pages
        run: pnpm --filter web pa11y
